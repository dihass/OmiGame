name: Keep API Warm

# Render's free tier spins the API down after 15 minutes of inactivity, and the
# first request after that waits ~60s for a cold start. Pinging /healthz on a
# schedule keeps it warm so real visitors don't see that delay.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthz
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://omigame-s6ii.onrender.com/healthz)
          echo "Status: $status"
          if [ "$status" != "200" ]; then
            echo "::warning::Health check returned $status"
          fi
