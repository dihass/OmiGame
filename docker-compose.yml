services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Redis: "redis:6379"
      Jwt__SigningKey: "omi-dev-signing-key-must-be-at-least-32-chars"
      Jwt__Issuer: "omi-platform"
      Jwt__Audience: "omi-client"
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
